name: "E2E Tests"

on: workflow_call

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    name: Tests
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Setup go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: ./go.mod

    - name: Install browsers
      # Install the Playwright driver and browsers using the playwright-go CLI
      # pinned to the exact version from go.mod, so the driver always matches
      # what the tests load at runtime. The previous `npx playwright install`
      # pulled an unrelated npm version and left the go driver uninstalled,
      # making the tests fail to start with "please install the driver first".
      run: |
        PLAYWRIGHT_VERSION=$(go list -m -f '{{.Version}}' github.com/mxschmitt/playwright-go)
        go run github.com/mxschmitt/playwright-go/cmd/playwright@${PLAYWRIGHT_VERSION} install --with-deps

    - run: make e2e

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: e2e-test-report
        path: e2e-report.html
        if-no-files-found: ignore
